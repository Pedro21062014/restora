name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-64:
    name: Build Windows 64-bit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Restora v__VERSION__'
          releaseBody: 'Restora - Lightweight File Recovery Tool'
          releaseDraft: true
          prerelease: false

  build-windows-32:
    name: Build Windows 32-bit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable with 32-bit target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App (32-bit)
        run: |
          npm install -g @tauri-apps/cli
          npx tauri build --target i686-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload 32-bit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-32bit
          path: |
            src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi

  build-ubuntu:
    name: Build Ubuntu (deb & AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Restora v__VERSION__'
          releaseBody: 'Restora - Lightweight File Recovery Tool'
          releaseDraft: true
          prerelease: false

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Restora v__VERSION__'
          releaseBody: 'Restora - Lightweight File Recovery Tool'
          releaseDraft: true
          prerelease: false

  publish-release:
    name: Publish Release
    needs: [build-windows-64, build-windows-32, build-ubuntu, build-macos]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
          name: 'Restora v1.0.0 - File Recovery Tool'
          body: |
            ## 🔄 Restora v1.0.0

            ### Instalação
            - **Windows 64-bit**: `Restora_1.0.0_x64-setup.exe`
            - **Windows 32-bit**: `Restora_1.0.0_x86-setup.exe` (PCs antigos)
            - **Linux (Debian/Ubuntu)**: `restora_1.0.0_amd64.deb`
            - **Linux (AppImage)**: `Restora_1.0.0_amd64.AppImage`
            - **macOS**: `Restora_1.0.0_x64.dmg`

            ### Recursos
            - 🔍 Scan rápido e profundo
            - 🖼️ Recuperação de imagens, vídeos, áudios, documentos
            - 🔧 Reparo automático de arquivos danificados
            - 🖼️ Filtro de thumbnails
            - 💻 Funciona com 2GB de RAM
            - 🖥️ Suporte a 32-bit Windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
